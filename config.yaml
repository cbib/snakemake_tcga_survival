# paths to static input files
TCGA_cohorts: 'config/tcga_projects.txt'
signatures_file: 'config/gene_signatures.txt'

# params for survival_screening.smk
DPI: 400
THRESHOLD: 0.05

# define pathvars
pathvars:
  results: '/scratch/CBIB/soterino/smk_tcga_results'
  logs: '/scratch/CBIB/soterino/smk_logs'

# set resources per rule
resources:
  biomaRt_download:
    mem: 4G
    time: 1:00:00
    threads: 2
  DESeq2_normalization:
    mem: 10G
    time: 4:00:00
    threads: 2
  survival_screening:
    mem: 10G
    time: 4:00:00
    threads: 2
  TCGA_download:
    mem: 20G
    time: 4:00:00
    threads: 3
  merge_survival_results:
    mem: 5G
    time: 1:00:00
    threads: 3